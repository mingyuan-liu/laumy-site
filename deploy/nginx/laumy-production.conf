server {
    listen 80;
    server_name laumy.tech www.laumy.tech;
    return 301 https://www.laumy.tech$request_uri;
}

server {
    listen 443 ssl;
    server_name laumy.tech;

    ssl_certificate /etc/nginx/cert/www.laumy.tech.pem;
    ssl_certificate_key /etc/nginx/cert/www.laumy.tech.key;

    return 301 https://www.laumy.tech$request_uri;
}

server {
    listen 443 ssl;
    server_name www.laumy.tech;

    ssl_certificate /etc/nginx/cert/www.laumy.tech.pem;
    ssl_certificate_key /etc/nginx/cert/www.laumy.tech.key;

    root /var/www/laumy-static/current;
    index index.html;
    client_max_body_size 10m;

    location = /waline {
        return 301 /waline/;
    }

    location /waline/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_pass http://127.0.0.1:8360/;
    }

    include /srv/laumy-site/deploy/generated/protected-*.conf;

    location ^~ /assets/posts/ {
        alias /var/www/laumy-static/shared/assets/posts/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    location = /deploy-hook {
        client_max_body_size 256k;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:8789/deploy-hook;
    }

    location = /deploy-hook/healthz {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_pass http://127.0.0.1:8789/deploy-hook/healthz;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
