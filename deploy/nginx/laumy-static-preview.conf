server {
    listen 8088;
    server_name _;
    root /var/www/laumy-static/current;
    index index.html;

    location /waline/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_pass http://127.0.0.1:8360/;
    }

    location ^~ /assets/posts/ {
        alias /var/www/laumy-static/shared/assets/posts/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    location = /deploy-hook {
        client_max_body_size 256k;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:8789/deploy-hook;
    }

    location = /deploy-hook/healthz {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_pass http://127.0.0.1:8789/deploy-hook/healthz;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
